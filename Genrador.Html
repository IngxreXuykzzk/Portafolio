<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Seguridad Pro</title>
    <style>
        :root {
            --bg-dark: #1e1e2e;
            --card-bg: #2b2b3b;
            --text-main: #ffffff;
            --text-dim: #a0a0b0;
            --accent: #ff9e9e; 
            --success: #4ade80;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .generator-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Área de Resultado */
        .password-display-container {
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
        }

        #password-result {
            font-family: 'Consolas', monospace;
            font-size: 1.4rem;
            letter-spacing: 1px;
            word-break: break-all;
            margin-bottom: 10px;
            min-height: 1.5em;
            color: var(--text-main);
            transition: opacity 0.2s;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            color: var(--success);
            font-size: 0.9rem;
            gap: 5px;
        }

        /* Controles */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .label-text {
            font-size: 1rem;
            color: var(--text-main);
        }

        /* Select Estilizado */
        select {
            background: transparent;
            color: var(--accent);
            border: none;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            text-align: right;
            font-weight: 500;
        }

        /* Slider */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: flex-end;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            background: #3e3e4e;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3e3e4e;
            transition: .4s;
            border-radius: 34px;
        }

        .slider-round:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(18px); }

        .footer-options {
            margin-top: 25px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="generator-card">
        <!-- Resultado -->
        <div class="password-display-container" onclick="copyToClipboard()">
            <div id="password-result">...</div>
            <div class="status-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Fuerte
            </div>
        </div>

        <!-- Tipo -->
        <div class="control-row">
            <span class="label-text">Tipo</span>
            <select id="gen-type" onchange="toggleMode()">
                <option value="random">Contraseña aleatoria</option>
                <option value="words">Contraseña memorizable</option>
            </select>
        </div>

        <!-- Longitud Dinámica (Caracteres o Palabras) -->
        <div class="control-row">
            <span class="label-text" id="length-label">20 caracteres</span>
            <div class="slider-container">
                <input type="range" id="length-slider" min="8" max="50" value="20" oninput="updateLength(this.value)">
            </div>
        </div>

        <!-- Caracteres Especiales -->
        <div class="control-row">
            <span class="label-text">Caracteres especiales<br><small style="color:var(--text-dim)">( !&* )</small></span>
            <label class="switch">
                <input type="checkbox" id="special-chars" checked onchange="generate()">
                <span class="slider-round"></span>
            </label>
        </div>

        <!-- Botón de Acción -->
        <div class="footer-options" onclick="generate()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            Regenerar contraseña
        </div>
    </div>

    <script>
        // Diccionario para frases (puedes ampliarlo)
        const dictionary = ["nube", "gato", "roca", "fuego", "sol", "verde", "salto", "azul", "luz", "bosque", "mar", "viento", "tigre", "lluvia", "piano", "alfa"];

        // Cambia la configuración del slider según el modo
        function toggleMode() {
            const type = document.getElementById('gen-type').value;
            const slider = document.getElementById('length-slider');
            
            if (type === "words") {
                slider.min = "3";
                slider.max = "10";
                slider.value = "4";
            } else {
                slider.min = "8";
                slider.max = "50";
                slider.value = "20";
            }
            updateLength(slider.value);
        }

        function updateLength(val) {
            const type = document.getElementById('gen-type').value;
            const label = document.getElementById('length-label');
            label.innerText = type === "words" ? `${val} palabras` : `${val} caracteres`;
            generate();
        }

        function generate() {
            const length = parseInt(document.getElementById('length-slider').value);
            const type = document.getElementById('gen-type').value;
            const useSpecial = document.getElementById('special-chars').checked;
            let result = "";

            if (type === "random") {
                let charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                if (useSpecial) charset += "!@#$%^&*()_+";
                
                const randomArr = new Uint32Array(length);
                window.crypto.getRandomValues(randomArr);
                
                for (let i = 0; i < length; i++) {
                    result += charset[randomArr[i] % charset.length];
                }
            } else {
                // MODO FRASES (Memorizable)
                let chosenWords = [];
                const randomArr = new Uint32Array(length);
                window.crypto.getRandomValues(randomArr);

                for (let i = 0; i < length; i++) {
                    let word = dictionary[randomArr[i] % dictionary.length];
                    // Capitalización aleatoria para seguridad
                    if (randomArr[i] % 2 === 0) word = word.charAt(0).toUpperCase() + word.slice(1);
                    chosenWords.push(word);
                }
                
                const separator = useSpecial ? "!" : "-";
                result = chosenWords.join(separator);
            }

            document.getElementById('password-result').innerText = result;
        }

        function copyToClipboard() {
            const text = document.getElementById('password-result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const badge = document.querySelector('.status-badge');
                const originalText = badge.innerHTML;
                badge.innerHTML = "¡Copiado!";
                badge.style.color = "#ff9e9e";
                setTimeout(() => {
                    badge.innerHTML = originalText;
                    badge.style.color = "";
                }, 1000);
            });
        }

        window.onload = generate;
    </script>
</body>
</html>
