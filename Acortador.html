<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortener v5 | is.gd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        body { 
            font-family: 'Fira Code', monospace;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-200">

    <div class="max-w-md w-full glass rounded-[2.5rem] p-10 shadow-2xl">
        
        <header class="mb-10">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">Link</h1>
            <p class="text-xs text-slate-500"></p>
        </header>

        <div class="space-y-6">
            <div class="group">
                <label class="text-[10px] uppercase tracking-widest text-slate-400 mb-2 block">Ingrese su URL</label>
                <input type="url" id="longUrl" placeholder="https://mi-servidor.com/log" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-4 outline-none focus:border-emerald-500/50 transition-all text-sm text-emerald-400">
            </div>

            <button onclick="generateShort()" id="btnAction" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-emerald-900/20">
                SHORTEN
            </button>
        </div>

        <!-- Result Area Modificada -->
        <div id="resultCard" class="hidden mt-10 p-6 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl animate-in fade-in duration-500">
            <p class="text-[10px] font-bold text-emerald-500 uppercase mb-4 text-center tracking-widest">Successful Compression</p>
            
            <input type="text" id="shortUrl" readonly class="w-full bg-transparent border-none text-center text-white font-semibold outline-none mb-4">
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="copyToClipboard()" id="copyBtn" class="text-[10px] text-slate-300 hover:text-emerald-400 transition-colors py-3 border border-slate-700 rounded-xl uppercase font-bold">
                    Copy Link
                </button>
                <button onclick="resetAll()" class="text-[10px] text-slate-300 hover:text-red-400 transition-colors py-3 border border-slate-700 rounded-xl uppercase font-bold">
                    Clear / New
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generateShort() {
            const longUrl = document.getElementById('longUrl').value;
            const btn = document.getElementById('btnAction');
            const resultCard = document.getElementById('resultCard');
            const output = document.getElementById('shortUrl');

            if (!longUrl) return;

            btn.disabled = true;
            btn.innerText = "RUNNING...";

            try {
                const apiUrl = `https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.contents && !data.contents.includes("Error")) {
                    output.value = data.contents;
                    resultCard.classList.remove('hidden');
                    btn.classList.add('hidden'); // Ocultamos el botón principal al terminar
                } else {
                    alert("Error: Asegúrate de incluir http:// o https://");
                }
            } catch (error) {
                alert("Network error. Try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SHORTEN";
            }
        }

        function resetAll() {
            document.getElementById('longUrl').value = "";
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('btnAction').classList.remove('hidden');
            
            // Resetear estado del botón copiar
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copy Link";
            copyBtn.classList.remove('text-emerald-400', 'border-emerald-500/30');
        }

        function copyToClipboard() {
            const copyText = document.getElementById('shortUrl');
            const btn = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(copyText.value);
            
            btn.innerText = "Copied!";
            btn.classList.add('text-emerald-400', 'border-emerald-500/30');
            
            setTimeout(() => {
                btn.innerText = "Copy Link";
                btn.classList.remove('text-emerald-400', 'border-emerald-500/30');
            }, 2000);
        }
    </script>
</body>
</html>
