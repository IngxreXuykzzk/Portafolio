<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREAS DE ESTUDIO</title>
    <style>
        :root {
            --cyber-bg: #050a0f;
            --cyber-grid: rgba(0, 255, 157, 0.05);
            --cyber-accent: #00ff9d; 
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cyber-bg);
            color: #ffffff;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- FONDO --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--cyber-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--cyber-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyber-accent), transparent);
            opacity: 0.3;
            animation: scan 4s linear infinite;
            z-index: -1;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .nav-logo {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--cyber-accent);
            text-shadow: 0 0 10px var(--cyber-accent);
        }

        /* Carrusel */
        .carousel-viewport {
            width: 100%;
            position: relative;
            overflow: hidden;
            padding: 50px 0;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .card {
            min-width: 350px;
            margin: 0 15px;
            height: 500px; /* Aumentado ligeramente para el logo */
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            position: relative;
        }

        .card.active {
            border-color: var(--cyber-accent);
            background: rgba(0, 255, 157, 0.05);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
        }

        /* Estilos de los nuevos elementos */
        .card-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px var(--cyber-accent));
        }

        .card-num {
            font-size: 0.7rem;
            color: var(--cyber-accent);
            margin-bottom: 10px;
            display: block;
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
        }

        .card p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            flex-grow: 1; /* Empuja el botón hacia abajo */
        }

        .card-link {
            text-decoration: none;
            color: var(--cyber-accent);
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border: 1px solid var(--cyber-accent);
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .card-link:hover {
            background: var(--cyber-accent);
            color: var(--cyber-bg);
            box-shadow: 0 0 15px var(--cyber-accent);
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            color: var(--cyber-accent);
            border: 1px solid var(--cyber-accent);
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--cyber-accent);
            color: var(--cyber-bg);
        }
    </style>
</head>
<body>

    <div class="scan-line"></div>
    <div class="nav-logo">LABORATORIOS</div>

    <div class="carousel-viewport">
        <div class="carousel-track" id="track"></div>
    </div>

    <div class="controls">
        <button class="btn" id="prev">←</button>
        <button class="btn" id="next">→</button>
    </div>

    <script>
        // Configuración de los Laboratorios
        const labs = [
            { 
                id: '01', 
                logo: 'tryhackme.webp', // URL de imagen
                title: 'Try Hack Me', 
                desc: 'Es una plataforma basada en la nube que permite a los usuarios aprender ciberseguridad a través de "Rooms" (Salas) interactivas. Cubre desde conceptos básicos de redes hasta técnicas avanzadas de explotación y análisis forense.',
                url: 'https://tryhackme.com/p/ingxrexuykzzk'
            },
            { 
                id: '02', 
                logo: 'HackTheBox.webp', // URL de imagen
                title: 'Hack The Box', 
                desc: 'Hack The Box (HTB) es la plataforma de entrenamiento en ciberseguridad más reconocida a nivel mundial por su enfoque técnico y su competitividad. A diferencia de TryHackMe, que es más guiado, HTB es famoso por su filosofía "Try Harder", donde el usuario suele enfrentarse a retos con menos ayuda inicial para simular escenarios reales de intrusión.',
                url: 'https://tryhackme.com/p/ingxrexuykzzk'
            },
            { 
                id: '03', 
                logo: 'Cisco.png',
                title: 'Cisco Networking Academy Home', 
                desc: 'Cursos gratuitos en línea. Aprendizaje presencial. Rutas alineadas con la certificación diseñadas para ayudarlo a destacar en el mercado laboral. Desde inteligencia artificial y ciberseguridad hasta redes y conciencia digital, todo está aquí.',
                url: 'https://www.netacad.com/es/profile?tab=badges'
            },
        ];

        const track = document.getElementById('track');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');

        // Clonar para efecto infinito
        const fullLabs = [...labs.slice(-2), ...labs, ...labs.slice(0, 2)];
        
        fullLabs.forEach((lab) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${lab.logo}" alt="Logo ${lab.title}" class="card-logo">
                <span class="card-num">[ MODULE_${lab.id} ]</span>
                <h2>${lab.title}</h2>
                <p>${lab.desc}</p>
                <a href="${lab.url}" target="_blank" class="card-link">ACCEDER</a>
            `;
            track.appendChild(card);
        });

        let currentIndex = 2; 
        const cardWidth = 380; 

        function updatePosition(animate = true) {
            if (!animate) track.style.transition = 'none';
            else track.style.transition = 'transform 0.6s cubic-bezier(0.19, 1, 0.22, 1)';
            
            const centerOffset = (window.innerWidth / 2) - (cardWidth / 2);
            track.style.transform = `translateX(${centerOffset - (currentIndex * cardWidth)}px)`;

            const allCards = document.querySelectorAll('.card');
            allCards.forEach((c, i) => {
                c.classList.toggle('active', i === currentIndex);
            });
        }

        function checkJump() {
            if (currentIndex >= labs.length + 2) {
                currentIndex = 2;
                updatePosition(false);
            }
            if (currentIndex <= 1) {
                currentIndex = labs.length + 1;
                updatePosition(false);
            }
        }

        nextBtn.addEventListener('click', () => {
            currentIndex++;
            updatePosition();
            setTimeout(checkJump, 600);
        });

        prevBtn.addEventListener('click', () => {
            currentIndex--;
            updatePosition();
            setTimeout(checkJump, 600);
        });

        window.addEventListener('resize', () => updatePosition(false));
        updatePosition(false);
    </script>
</body>
</html>
